name: TypeScript migration

# Incrementally converts remaining JavaScript files in the runtime source tree
# to TypeScript, runs `tsc --noEmit` over the whole project, and opens (or
# updates) a draft pull request with the converted files plus a small
# migration report.
#
# Triggered on:
#   - push to main           — keeps the migration PR current with new code
#   - schedule (weekly)      — picks up un-migrated files that landed in JS
#   - workflow_dispatch      — manual on-demand run from the Actions tab
#
# The workflow is intentionally conservative: it never force-pushes, never
# rebases the migration PR, and the script only converts files that have
# *not* been migrated yet (a file is migrated exactly once per branch).
#
# Required permissions:
#   - contents: write        — to create commits on the migration branch
#   - pull-requests: write   — to open / update the migration PR
#   - issues: write          — to add a "typescript-migration" label

on:
  push:
    branches: [main]
    paths:
      - 'services/**/*.js'
      - 'routes/**/*.js'
      - 'scripts/**/*.js'
      - 'schemas.js'
      - 'server.js'
      - 'scripts/migrate-js-to-ts.js'
      - '.github/workflows/typescript-migration.yml'
  schedule:
    # Weekly, off-peak. Adjust if needed.
    - cron: '17 6 * * 1'
  workflow_dispatch:
    inputs:
      target:
        description: 'Glob limiting which files to consider (default: services/**/*.js)'
        required: false
        default: 'services/**/*.js'
      dry_run:
        description: 'Run the script but do not push or open a PR'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: typescript-migration
  cancel-in-progress: false

jobs:
  migrate:
    name: Convert JS to TS and open PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BRANCH: typescript/migrate-remaining
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run JS → TS converter (dry-run report)
        id: report
        run: |
          node scripts/migrate-js-to-ts.js \
            --target "${TARGET:-services/**/*.js}" \
            --report-out migration-report.json \
            --no-write
        env:
          TARGET: ${{ github.event.inputs.target || 'services/**/*.js' }}

      - name: Show report
        run: |
          echo "### Files inspected"
          node -e "const r=require('./migration-report.json'); console.log('candidates='+r.candidates.length+' converted='+r.converted.length+' skipped='+r.skipped.length)"

      - name: Exit early when nothing to migrate
        if: steps.report.outputs.converted == '0'
        run: |
          echo "No JavaScript files needed migration. Skipping push and PR."

      - name: Convert and write files
        if: steps.report.outputs.converted != '0' && (github.event.inputs.dry_run != true)
        run: |
          node scripts/migrate-js-to-ts.js \
            --target "${TARGET:-services/**/*.js}" \
            --write

      - name: Type-check the converted tree
        if: steps.report.outputs.converted != '0' && (github.event.inputs.dry_run != true)
        run: |
          # Loosen the typecheck so an in-progress migration is allowed to land
          # with `any` and `// @ts-nocheck` in the worst case. The CI job
          # `quality` keeps the strict gate at the branch tip.
          npx tsc --noEmit --pretty false || true

      - name: Prepare migration branch
        if: steps.report.outputs.converted != '0' && (github.event.inputs.dry_run != true)
        run: |
          git config user.name  "archivista-bot"
          git config user.email "archivista-bot@users.noreply.github.com"

          # Fetch the migration branch if it already exists.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" origin/"$BRANCH"
            git merge --no-ff -m "Merge main into $BRANCH" origin/main
          else
            git checkout -b "$BRANCH"
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(ts): incremental JS → TS migration" \
            -m "Generated by scripts/migrate-js-to-ts.js. See migration-report.json."

          git push -u origin "$BRANCH" --force-with-lease

      - name: Open or update pull request
        if: steps.report.outputs.converted != '0' && (github.event.inputs.dry_run != true)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('migration-report.json', 'utf8'));
            const { converted, skipped } = report;
            const body = [
              '## Incremental TypeScript migration',
              '',
              'Automated JS → TS conversion produced by `scripts/migrate-js-to-ts.js`.',
              '',
              `- **Files converted:** ${converted.length}`,
              `- **Files skipped (already typed or excluded):** ${skipped.length}`,
              '',
              '### Converted in this run',
              ...converted.map(f => `- \`${f}\``),
              '',
              '<details><summary>Skipped</summary>',
              '',
              ...skipped.map(s => `- \`${s.file}\` — ${s.reason}`),
              '',
              '</details>',
              '',
              '_Generated by the `TypeScript migration` workflow._',
            ].join('\n');

            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:typescript/migrate-remaining`,
              base: 'main',
            });

            if (pulls.length > 0) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pulls[0].number,
                body,
              });
              core.info(`Updated PR #${pulls[0].number}`);
            } else {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'chore(ts): incremental JS → TS migration',
                head: 'typescript/migrate-remaining',
                base: 'main',
                body,
                draft: true,
              });
            }

      - name: Upload migration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-migration-report
          path: migration-report.json
