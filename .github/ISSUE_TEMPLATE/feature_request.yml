name: Feature request
description: Suggest a focused improvement to Tagvico AI
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for sharing an idea. Explain the problem first so different solutions can be considered.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      placeholder: When I … I cannot …
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
      description: Describe the user-visible result rather than only an implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other designs have you tried?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, mockups, provider details, or related projects when useful.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions for similar requests.
          required: true
