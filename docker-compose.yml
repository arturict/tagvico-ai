services:
  tagvico-ai:
    # Pin a release tag so upgrades and rollbacks remain predictable.
    image: ghcr.io/arturict/tagvico-ai:1.1.0
    container_name: tagvico-ai
    network_mode: bridge
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges=true
    environment:
      - PUID=1000
      - PGID=1000
      - ARCHIVISTA_AI_PORT=${ARCHIVISTA_AI_PORT:-3000}
    ports:
      - "${ARCHIVISTA_AI_HOST_PORT:-8080}:${ARCHIVISTA_AI_PORT:-3000}"
    volumes:
      - tagvico_ai_data:/app/data

volumes:
  tagvico_ai_data:
