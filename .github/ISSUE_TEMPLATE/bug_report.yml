name: Bug report
description: Tell us about reproducible, unexpected behavior
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Archivista AI. Please search existing issues first and remove secrets, API keys, document text, and personal data from logs or screenshots.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Explain what you expected and what happened instead.
      placeholder: I expected … but …
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      placeholder: |
        1. Configure …
        2. Open …
        3. Click …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Archivista AI version
      description: Use the image tag, release, or commit SHA—not just "latest".
      placeholder: "1.1.0"
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - Docker Compose / GHCR image
        - Docker run / GHCR image
        - From source
        - Other
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Provider and model
      description: If relevant; never include an API key.
      placeholder: OpenAI / gpt-5-mini, Ollama / qwen3, …
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste the smallest useful excerpt after removing secrets and personal data.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Add screenshots, browser/OS details, or related issues when useful.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed secrets and personal data from this report.
          required: true
