server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /docs {
        return 308 /docs/;
    }

    location /docs/ {
        try_files $uri $uri.html $uri/ /docs/index.html;
    }

    location ~* ^/docs/.*\.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
