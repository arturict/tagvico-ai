services:
  archivista-ai:
    # Pin a release tag so upgrades and rollbacks remain predictable.
    image: ghcr.io/arturict/archivista-ai:1.1.0
    container_name: archivista-ai
    network_mode: bridge
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges=true
    environment:
      - PUID=1000
      - PGID=1000
      - ARCHIVISTA_AI_PORT=${ARCHIVISTA_AI_PORT:-3000}
    ports:
      - "${ARCHIVISTA_AI_HOST_PORT:-8080}:${ARCHIVISTA_AI_PORT:-3000}"
    volumes:
      - archivista_ai_data:/app/data

volumes:
  archivista_ai_data:
