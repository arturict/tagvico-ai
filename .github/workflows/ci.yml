name: CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run docs:build
      - run: npm audit --omit=dev --audit-level=high
      - run: node --check dist/server.js
        # Syntax-only smoke test; starting the server would keep CI alive.
      - name: Verify package scripts
        run: |
          node -e "const p=require('./package.json'); if(!p.scripts.start) throw new Error('missing start script')"
